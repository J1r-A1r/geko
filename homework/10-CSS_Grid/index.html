<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Nested Grid Perfect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

  <div class="card g1">
    <div class="red"></div><div class="darkorange"></div><div class="orange"></div>
    <div class="darkgreen"></div><div class="green"></div><div></div>
  </div>

  <div class="card g2">
    <div class="big red"></div>
    <div class="darkgreen"></div>
    <div></div>
    <div class="area2 orange"></div>
  </div>

  <div class="card g3">
    <div class="full orange"></div>
    <div class="wide1 darkgreen"></div>
    <div class="wide red"></div>
    <div class="full green"></div>
  </div>

  <div class="card g4">
    <div class="wide darkorange"></div>
    <div class="wide red"></div>
    <div class="medium darkgreen"></div>
    <div class="medium medium1 green"></div>
    <div class="full orange"></div>
  </div>

  <div class="card g5">
    <div class="darkgreen"></div><div class="darkorange"></div><div class="green"></div><div class="red"></div><div></div><div class="darkorange"></div>
    <div class="orange"></div><div class="darkgreen"></div><div class="darkorange"></div><div class="green"></div><div class="orange"></div><div class="red"></div>
    <div class="darkgreen"></div><div class="red"></div><div class="darkorange"></div><div class="darkgreen"></div><div class="darkgreen"></div><div></div>
  </div>

 <div class="card g6">

  <div class="red1 red"></div>
  <div class="darkgreen1 darkgreen"></div>
  <div class="orangeTop orange"></div>

  <div class="lightorange darkorange"></div>
  <div class="green1 darkgreen1"></div>
  <div class="mint green"></div>

  <div class="bigorange orange"></div>
  <div class="mint2 "></div>
  <div class="red2 red"></div>

  <div class="darkgreen2 darkgreen"></div>

  <div class="static1"></div>
  <div class="orangeBottom orange"></div>

</div>  

  <div class="card g7">
    <div class="topLeft orange"></div>
  <div class="topRight"></div>

  <div class="bigRed red"></div>

  <div class="rightGrid darkgreen">
      <div class="rightTop"></div>
      <div class="rightBottomLeft green"></div>
      <div class="rightBottomRight orange"></div>
  </div>
  </div>

  <div class="card g8">
    <div class="red"></div>
    <div class="orange"></div>
    <div></div>
    <div class="green"></div>
    <div class="darkgreen"></div>
    <div class="orange"></div>
    <div class="red"></div>
    <div class="medium8 darkorange"></div>
    <div class="full"></div>
  </div>

  <div class="card g9">
    <div class="full orange"></div>
    <div class="darkgreen big9 "></div>
    <div class="medium9 "></div>
    <div class="red bottom9"></div>
    <div class="orange bottom9"></div>
  </div>

</div>

</body>
</html>
